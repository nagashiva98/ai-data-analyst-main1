{% extends "base.html" %}
{% block title %}Register — AI Data Analyst{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo">🔮</div>
            <h2>Create account</h2>
            <p>Get started with AI-powered data analysis</p>
        </div>

        <form id="register-form" onsubmit="return handleRegister(event)">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" class="form-input" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required
                    minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="register-btn">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/static/js/app.js"></script>
<script src="/static/js/auth.js"></script>
{% endblock %}
