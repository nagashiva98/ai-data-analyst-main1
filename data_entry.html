{% extends "base.html" %}
{% block title %}Add Data — AI Data Analyst{% endblock %}
{% block nav_add %}active{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Add Data Record</h2>
    <p>Enter employee performance and salary data</p>
</div>

<div class="card" style="max-width: 600px;">
    <form id="data-form" onsubmit="return handleAddData(event)">
        <div class="form-group">
            <label for="employee_name">Employee Name</label>
            <input type="text" id="employee_name" class="form-input" placeholder="Jane Smith" required>
        </div>

        <div class="form-group">
            <label for="department">Department</label>
            <select id="department" class="form-input" required>
                <option value="">Select department...</option>
                <option value="Engineering">Engineering</option>
                <option value="Marketing">Marketing</option>
                <option value="Sales">Sales</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Operations">Operations</option>
                <option value="Design">Design</option>
                <option value="Product">Product</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
                <label for="salary">Salary ($)</label>
                <input type="number" id="salary" class="form-input" placeholder="85000" min="0" step="1" required>
            </div>
            <div class="form-group">
                <label for="performance_score">Performance Score (0–100)</label>
                <input type="number" id="performance_score" class="form-input" placeholder="87.5" min="0" max="100"
                    step="0.1" required>
            </div>
        </div>

        <div class="form-group">
            <label for="record_date">Date</label>
            <input type="date" id="record_date" class="form-input" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
            ➕ Add Record
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/data.js"></script>
{% endblock %}
